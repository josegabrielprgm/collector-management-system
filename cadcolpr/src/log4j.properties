# Set the default log level for all loggers to INFO (or WARN/ERROR)
log4j.rootLogger=INFO, stdout

# Set the log level for all org.hibernate packages to ERROR to silence them
log4j.logger.org.hibernate=ERROR, stdout

# Specific loggers for fine-grained control:
# Only show startup messages as INFO, hide others
# log4j.logger.org.hibernate=INFO 

# Hide JDBC and SQL statement logs (requires org.hibernate level to be higher than DEBUG/INFO)
# log4j.logger.org.hibernate.SQL=ERROR 
# log4j.logger.org.hibernate.type.descriptor.sql=ERROR 

# Define the console appender (stdout)
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%d{ABSOLUTE} %5p %c{1}:%L - %m%n
